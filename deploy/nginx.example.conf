# PublishRail — example nginx config
# Replace: your-domain.com → your actual domain
# TLS certs are managed by certbot (Let's Encrypt)
#
# Setup:
#   sudo cp this file /etc/nginx/sites-available/publishrail
#   sudo ln -s /etc/nginx/sites-available/publishrail /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d your-domain.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Modern TLS only
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:3737;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for Server-Sent Events (the generate log stream)
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_cache_bypass $http_upgrade;
    }
}
